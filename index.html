<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لعبة الريموت</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #dff3ff;
      transition: 0.3s;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 20px;
    }

    button {
      padding: 15px;
      margin: 8px;
      font-size: 18px;
      width: 220px;
      cursor: pointer;
    }

    #msg {
      font-size: 24px;
      margin-top: 20px;
      font-weight: bold;
    }

    .horror {
      background: #2b0000 !important;
      color: white;
      animation: shake 0.2s infinite;
    }

    @keyframes shake {
      0% {
        transform: translate(2px, 2px);
      }
      50% {
        transform: translate(-2px, -2px);
      }
      100% {
        transform: translate(2px, 2px);
      }
    }
  </style>
</head>
<body>
  <h1>🎮 لعبة الريموت</h1>
  <div id="msg">اختار مكان الريموت 👀</div>

  <button onclick="check('كنبة')">كنبة</button>
  <button onclick="check('طاولة')">طاولة</button>
  <button onclick="check('مخدة')">مخدة</button>
  <button onclick="check('خزانة')">خزانة</button>
  <button onclick="check('تلفزيون')">تلفزيون</button>

  <script>
    const places = ['كنبة', 'طاولة', 'مخدة', 'خزانة', 'تلفزيون'];
    const remote = places[Math.floor(Math.random() * places.length)];

    function check(selectedPlace) {
      if (selectedPlace === remote) {
        document.body.classList.remove('horror');
        document.getElementById('msg').innerText = '🎉 أهلاً أهلاً أهلاً هيي هيي';
      } else {
        document.body.classList.add('horror');
        document.getElementById('msg').innerText = '😈 غلط... حاول تاني لو تقدر';

        setTimeout(() => {
          document.body.classList.remove('horror');
        }, 2000);
      }
    }
  </script>
</body>
</html>
